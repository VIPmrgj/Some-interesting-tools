<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>赛博敲木鱼 · 功德+1</title>
<!-- 🧘 favicon（SVG Data URI，零外部依赖） -->
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E🧘%3C/text%3E%3C/svg%3E">
<style>
/* ============ 基础 ============ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: radial-gradient(1100px 720px at 50% 32%, #2a1d10 0%, #1a1410 55%, #0f0b07 100%);
  background-color: #1a1410;
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
  color: #e8d5ae;
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation;                /* 移动端消除双击缩放延迟 */
  -webkit-tap-highlight-color: transparent;
}

/* ============ 粒子画布（rAF 驱动） ============ */
#fx { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

/* ============ 屏幕边缘金光（30 连击） ============ */
.edge-glow {
  position: fixed; inset: 0; z-index: 15; pointer-events: none;
  box-shadow: inset 0 0 120px 24px rgba(255, 175, 60, .30),
              inset 0 0 260px 60px rgba(255, 150, 40, .12);
  opacity: 0; transition: opacity .8s ease;
}
.edge-glow.on { opacity: 1; animation: glowPulse 2.2s ease-in-out infinite; }
@keyframes glowPulse { 0%, 100% { opacity: .7; } 50% { opacity: 1; } }

/* ============ 首页链接 ============ */
.home {
  position: fixed; top: 14px; left: 14px; z-index: 45;
  text-decoration: none; color: #d8b877; font-size: 14px;
  background: rgba(20, 14, 8, .6);
  border: 1px solid rgba(255, 190, 90, .25);
  padding: 6px 14px; border-radius: 999px;
  transition: all .25s;
}
.home:hover { color: #ffd76a; border-color: rgba(255, 190, 90, .6); box-shadow: 0 0 14px rgba(255, 180, 60, .25); }

/* ============ 顶部计数器（本次功德，翻牌动画） ============ */
.counter-wrap { position: fixed; top: 16px; left: 0; right: 0; z-index: 18; text-align: center; pointer-events: none; }
.title { font-size: 15px; font-weight: 600; letter-spacing: .4em; text-indent: .4em; color: rgba(255, 215, 140, .7); margin-bottom: 4px; }
.counter {
  display: flex; justify-content: center;
  font-size: clamp(42px, 8vw, 64px); font-weight: 700;
  color: #ffd76a; font-variant-numeric: tabular-nums;
  text-shadow: 0 0 18px rgba(255, 190, 60, .45), 0 2px 6px rgba(0, 0, 0, .5);
}
.digit { height: 1.15em; overflow: hidden; }
.reel  { display: flex; flex-direction: column; transition: transform .45s cubic-bezier(.2, .7, .3, 1); }
.reel span { display: block; height: 1.15em; line-height: 1.15em; min-width: .62em; text-align: center; }
.counter-label { font-size: 12px; letter-spacing: .35em; text-indent: .35em; color: rgba(230, 200, 150, .5); margin-top: 2px; }

/* ============ 中央舞台 ============ */
.stage {
  position: fixed; inset: 0; z-index: 2;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.fish-wrap { position: relative; display: grid; place-items: center; }
/* 木鱼周围呼吸微光 */
.fish-wrap::before {
  content: ''; position: absolute; inset: -34px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 180, 70, .16), transparent 70%);
  animation: breathe 4s ease-in-out infinite; z-index: 0; pointer-events: none;
}
@keyframes breathe { 0%, 100% { opacity: .55; transform: scale(1); } 50% { opacity: 1; transform: scale(1.06); } }

/* ---- 功德光轮（50 连击出现，99 连击增强） ---- */
.halo {
  position: absolute; left: 50%; top: 50%; z-index: 1;
  width: 320px; height: 320px; pointer-events: none;
  transform: translate(-50%, -50%) scale(.7);
  opacity: 0; transition: opacity .7s ease, transform .7s ease;
}
.halo.on { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.halo.intense { transform: translate(-50%, -50%) scale(1.1); }
.halo .rays {
  position: absolute; inset: 0; border-radius: 50%;
  background: repeating-conic-gradient(rgba(255, 196, 90, .55) 0deg 7deg, rgba(255, 196, 90, 0) 7deg 24deg);
  -webkit-mask: radial-gradient(circle, transparent 30%, #000 42%, #000 62%, transparent 72%);
          mask: radial-gradient(circle, transparent 30%, #000 42%, #000 62%, transparent 72%);
  animation: spin 5s linear infinite;
}
.halo .ring {
  position: absolute; inset: 18px; border-radius: 50%;
  border: 4px dashed rgba(255, 200, 100, .75);
  box-shadow: 0 0 30px rgba(255, 180, 60, .35), inset 0 0 25px rgba(255, 180, 60, .25);
  animation: spin 9s linear infinite reverse;
}
.halo.intense .rays { animation-duration: 1.8s; }
.halo.intense .ring {
  animation-duration: 3.5s;
  border-color: rgba(255, 225, 140, .95);
  box-shadow: 0 0 60px rgba(255, 190, 70, .65), inset 0 0 40px rgba(255, 190, 70, .45);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- 木鱼本体：径向渐变木纹 + 年轮 + 内阴影 ---- */
.fish {
  position: relative; z-index: 2;
  width: 200px; height: 200px; border-radius: 50%;
  border: none; padding: 0; cursor: pointer; outline: none;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  background:
    radial-gradient(circle at 35% 30%, rgba(255, 214, 140, .35), rgba(255, 214, 140, 0) 42%),
    repeating-radial-gradient(circle at 50% 45%, rgba(50, 26, 10, .28) 0 5px, rgba(0, 0, 0, 0) 5px 13px),
    radial-gradient(circle at 50% 45%, #a06a33 0%, #7c4e22 42%, #5b3617 70%, #3a2110 100%);
  box-shadow:
    inset 0 -14px 30px rgba(0, 0, 0, .55),
    inset 0 10px 22px rgba(255, 220, 160, .18),
    0 12px 40px rgba(0, 0, 0, .6),
    0 0 60px rgba(255, 170, 60, .14);
}
.fish:focus-visible { outline: 3px solid rgba(255, 200, 100, .7); outline-offset: 6px; }
.fish > span { pointer-events: none; }
/* 木鱼开口（音槽） */
.fish .slit {
  position: absolute; left: 50%; bottom: 30px; transform: translateX(-50%);
  display: block; width: 55%; height: 16px; border-radius: 50%;
  background: radial-gradient(ellipse at 50% 20%, #2a1608, #150a04 75%);
  box-shadow: inset 0 -4px 8px rgba(0, 0, 0, .85), 0 1px 0 rgba(255, 210, 150, .14);
}
/* 中央莲花 */
.fish .lotus {
  position: absolute; left: 50%; top: 42%; transform: translate(-50%, -50%);
  display: block; font-size: 58px;
  filter: drop-shadow(0 2px 6px rgba(0, 0, 0, .5));
}
/* 敲击回弹：0.9 → 1.05 → 1.0 */
.fish.striking { animation: strike .28s cubic-bezier(.34, 1.56, .64, 1); }
@keyframes strike {
  0%   { transform: scale(1); }
  30%  { transform: scale(.9); }
  65%  { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* ---- 连击指示 & 提示 ---- */
.combo-box {
  margin-top: 20px; font-size: 18px; color: #ffca5f;
  text-shadow: 0 0 10px rgba(255, 180, 60, .5);
  opacity: 0; transform: scale(.8); transition: all .25s;
}
.combo-box.on { opacity: 1; transform: scale(1); }
.combo-box b { display: inline-block; font-variant-numeric: tabular-nums; }
.combo-box.pop b { animation: comboPop .18s ease; }
@keyframes comboPop { 50% { transform: scale(1.35); } }
.hint { margin-top: 10px; font-size: 13px; letter-spacing: .15em; color: rgba(220, 190, 140, .45); transition: opacity 1s; }
.hint.hide { opacity: 0; }

/* ============ 点击点效果 ============ */
/* 飘浮功德文字（1.5 秒上浮消散，连击越高越大） */
.float-text { position: fixed; z-index: 30; pointer-events: none; transform: translate(-50%, -100%); }
.float-text span {
  display: block; white-space: nowrap; font-weight: 700; font-size: 20px;
  color: #ffd76a;
  text-shadow: 0 0 10px rgba(255, 185, 70, .65), 0 2px 4px rgba(0, 0, 0, .55);
  animation: floatUp 1.5s ease-out forwards;
}
.float-text.tier1 span { font-size: 26px; color: #ffcf5e; }
.float-text.tier2 span { font-size: 30px; color: #ffd970; text-shadow: 0 0 14px rgba(255, 190, 70, .85), 0 2px 5px rgba(0, 0, 0, .6); }
.float-text.tier3 span { font-size: 34px; color: #ffe089; }
.float-text.tier4 span { font-size: 38px; color: #ffe9a8; text-shadow: 0 0 18px rgba(255, 200, 80, 1), 0 0 40px rgba(255, 150, 40, .6); }
@keyframes floatUp {
  0%   { opacity: 0; transform: translateY(8px)  scale(.7); }
  12%  { opacity: 1; transform: translateY(0)    scale(1.08); }
  24%  {             transform: translateY(-10px) scale(1); }
  100% { opacity: 0; transform: translateY(-96px) scale(1); }
}
/* 点击涟漪 */
.ripple {
  position: fixed; z-index: 6; pointer-events: none;
  width: 14px; height: 14px; margin: -7px 0 0 -7px;
  border: 2px solid rgba(255, 200, 110, .85); border-radius: 50%;
  animation: rippleAnim .6s ease-out forwards;
}
@keyframes rippleAnim { 0% { transform: scale(1); opacity: .9; } 100% { transform: scale(9); opacity: 0; } }

/* ============ 里程碑横幅 ============ */
.banner {
  position: fixed; left: 50%; top: 24%; z-index: 40;
  transform: translate(-50%, -50%);
  pointer-events: none; white-space: nowrap;
  font-weight: 800; font-size: clamp(26px, 6vw, 40px);
  color: #ffdd7e;
  text-shadow: 0 0 18px rgba(255, 190, 70, .8), 0 0 46px rgba(255, 150, 40, .5), 0 3px 6px rgba(0, 0, 0, .6);
  animation: bannerIn 1.8s ease forwards;
}
.banner.big { font-size: clamp(30px, 7.5vw, 52px); }
@keyframes bannerIn {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(.4); }
  12%  { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
  22%  {             transform: translate(-50%, -50%) scale(1); }
  75%  { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.06); }
}

/* ============ 静息状态：飘羽 + 心静如水 ============ */
.feather {
  position: fixed; top: 0; z-index: 26; font-size: 30px; pointer-events: none;
  filter: drop-shadow(0 4px 8px rgba(0, 0, 0, .4));
  animation: featherFall var(--dur, 7s) ease-in-out forwards;
}
@keyframes featherFall {
  0%   { transform: translate(0, -14vh)    rotate(-16deg); opacity: 0; }
  10%  { opacity: .95; }
  30%  { transform: translate(-34px, 26vh) rotate(22deg); }
  55%  { transform: translate(28px, 52vh)  rotate(-20deg); }
  80%  { transform: translate(-26px, 80vh) rotate(16deg); }
  95%  { opacity: .95; }
  100% { transform: translate(8px, 108vh)  rotate(-6deg); opacity: 0; }
}
.zen {
  position: fixed; left: 50%; top: 27%; z-index: 26;
  transform: translateX(-50%);
  font-family: "Songti SC", "STSong", "SimSun", serif;
  font-size: clamp(24px, 5vw, 32px);
  letter-spacing: .5em; text-indent: .5em;
  color: rgba(255, 225, 170, .85);
  text-shadow: 0 0 16px rgba(255, 190, 90, .35);
  opacity: 0; pointer-events: none; white-space: nowrap;
}
.zen.show { animation: zenFade 3s ease forwards; }
@keyframes zenFade {
  0%   { opacity: 0; transform: translateX(-50%) translateY(8px); }
  20%  { opacity: 1; transform: translateX(-50%) translateY(0); }
  70%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) translateY(-6px); }
}

/* ============ 香火青烟（底部缓缓上升的小点） ============ */
.smoke {
  position: fixed; bottom: -20px; z-index: 1; pointer-events: none;
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(228, 222, 208, .16);
  filter: blur(3px);
  animation: rise linear forwards;
}
@keyframes rise {
  0%   { transform: translate(0, 0) scale(1); opacity: 0; }
  12%  { opacity: .5; }
  60%  { opacity: .28; }
  100% { transform: translate(var(--sway, 20px), -105vh) scale(2.4); opacity: 0; }
}

/* ============ 左下角功德榜 ============ */
.stats {
  position: fixed; left: 14px; bottom: 14px; z-index: 20;
  min-width: 172px; padding: 10px 14px;
  background: rgba(20, 14, 8, .72);
  border: 1px solid rgba(255, 190, 90, .25); border-radius: 12px;
  font-size: 13px; color: #cbb17f;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  box-shadow: 0 6px 24px rgba(0, 0, 0, .4);
}
.stats-title { font-size: 14px; font-weight: 700; color: #ffd76a; margin-bottom: 6px; }
.stats .row { display: flex; justify-content: space-between; gap: 14px; padding: 2px 0; }
.stats .row b { color: #ffe1a1; font-variant-numeric: tabular-nums; }

/* ============ 移动端适配 ============ */
@media (max-width: 520px) {
  .fish { width: 172px; height: 172px; }
  .fish .lotus { font-size: 48px; }
  .fish .slit { bottom: 25px; height: 14px; }
  .halo { width: 272px; height: 272px; }
  .stats { left: 10px; bottom: 10px; min-width: 150px; padding: 8px 10px; font-size: 12px; }
  .stats-title { font-size: 13px; }
}
</style>
</head>
<body>

<canvas id="fx"></canvas>
<div class="edge-glow" id="edgeGlow"></div>

<a class="home" href="index.html">🏠 首页</a>

<!-- 顶部：本次功德计数（翻牌数字） -->
<header class="counter-wrap">
  <h1 class="title">🧘 赛博敲木鱼</h1>
  <div class="counter" id="counter" aria-label="本次功德"></div>
  <div class="counter-label">本次功德</div>
</header>

<!-- 中央：光轮 + 木鱼 + 连击 -->
<main class="stage">
  <div class="fish-wrap">
    <div class="halo" id="halo" aria-hidden="true">
      <div class="rays"></div>
      <div class="ring"></div>
    </div>
    <button class="fish" id="fish" aria-label="敲击木鱼，功德加一">
      <span class="lotus" aria-hidden="true">🪷</span>
      <span class="slit" aria-hidden="true"></span>
    </button>
  </div>
  <div class="combo-box" id="comboBox">🔥 连击 <b id="comboNum">0</b></div>
  <div class="hint" id="hint">轻敲木鱼 · 功德 +1</div>
</main>

<div class="zen" id="zen">心静如水</div>

<!-- 左下角：功德榜（localStorage 持久化） -->
<aside class="stats">
  <div class="stats-title">🏆 功德榜</div>
  <div class="row"><span>今日功德</span><b id="s-today">0</b></div>
  <div class="row"><span>今日最高连击</span><b id="s-todayCombo">0</b></div>
  <div class="row"><span>历史最高连击</span><b id="s-maxCombo">0</b></div>
  <div class="row"><span>累计功德</span><b id="s-total">0</b></div>
</aside>

<script>
(function () {
  'use strict';

  /* ================= DOM 引用 ================= */
  var $ = function (id) { return document.getElementById(id); };
  var fishEl   = $('fish');
  var haloEl   = $('halo');
  var comboBox = $('comboBox');
  var comboNum = $('comboNum');
  var counterEl = $('counter');
  var edgeGlow = $('edgeGlow');
  var zenEl    = $('zen');
  var hintEl   = $('hint');
  var fxCanvas = $('fx');
  var fxCtx    = fxCanvas.getContext('2d');

  /* ================= 持久化统计（localStorage） ================= */
  var KEY = 'cyberWoodenFishStats';

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  var stats = { date: todayStr(), todayMerit: 0, todayBestCombo: 0, maxCombo: 0, totalMerit: 0 };
  try {
    var saved = JSON.parse(localStorage.getItem(KEY));
    if (saved && typeof saved === 'object') {
      stats.date           = typeof saved.date === 'string' ? saved.date : stats.date;
      stats.todayMerit     = +saved.todayMerit     || 0;
      stats.todayBestCombo = +saved.todayBestCombo || 0;
      stats.maxCombo       = +saved.maxCombo       || 0;
      stats.totalMerit     = +saved.totalMerit     || 0;
    }
  } catch (e) { /* 存储不可用时静默降级 */ }

  function saveStats() {
    try { localStorage.setItem(KEY, JSON.stringify(stats)); } catch (e) {}
  }

  /* 跨天时重置"今日"数据（加载时 + 每次敲击时都检查，兼容跨零点） */
  function checkDailyReset() {
    var t = todayStr();
    if (stats.date !== t) {
      stats.date = t;
      stats.todayMerit = 0;
      stats.todayBestCombo = 0;
      saveStats();
    }
  }
  checkDailyReset();

  function renderStats() {
    $('s-today').textContent      = stats.todayMerit;
    $('s-todayCombo').textContent = stats.todayBestCombo;
    $('s-maxCombo').textContent   = stats.maxCombo;
    $('s-total').textContent      = stats.totalMerit;
  }
  renderStats();
  window.addEventListener('pagehide', saveStats);

  /* ================= 会话状态 ================= */
  var sessionCount = 0;    // 本次会话敲击数
  var combo = 0;           // 当前连击
  var lastClickTime = 0;   // 上次敲击时间（performance.now()），0 = 尚未敲击
  var idleShown = false;   // 本轮静息动画是否已播放
  var lastPointerDown = 0; // 用于区分键盘触发的 click

  /* ================= Web Audio：敲击音效 ================= */
  var actx = null, master = null;

  function ensureAudio() {
    if (!actx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      actx = new AC();
      master = actx.createGain();
      master.gain.value = 0.9;
      var comp = actx.createDynamicsCompressor(); // 防止狂点时削波
      master.connect(comp);
      comp.connect(actx.destination);
    }
    if (actx.state === 'suspended') actx.resume();
  }

  /* 通用正弦音：freq → endFreq 微降，指数衰减 dur 秒 */
  function tone(freq, endFreq, vol, dur) {
    if (!actx) return;
    var t0 = actx.currentTime;
    var osc = actx.createOscillator();
    var g = actx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    if (endFreq && endFreq !== freq) {
      osc.frequency.exponentialRampToValueAtTime(endFreq, t0 + dur * 0.6);
    }
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.006);       // 极快起音，似敲击
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);      // 指数衰减
    osc.connect(g);
    g.connect(master);
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  }

  /* 木鱼"笃"：800Hz 主音 + 1600Hz 泛音（轻），带一点随机音高更自然 */
  function playDong() {
    var j = 1 + (Math.random() * 0.04 - 0.02);
    tone(800 * j, 745 * j, 0.5, 0.35);
    tone(1600 * j, 1520 * j, 0.14, 0.3);
  }

  /* 里程碑低沉"锣"：200Hz 长衰减；deep = 99 连击更低更长 */
  function playGong(deep) {
    if (deep) {
      tone(150, 138, 0.55, 1.4);
      tone(405, 380, 0.12, 0.9);
    } else {
      tone(200, 186, 0.45, 1.0);
      tone(540, 500, 0.10, 0.7);
    }
  }

  /* ================= 顶部翻牌计数器 ================= */
  function renderCounter(n) {
    var s = String(n);
    // 位数增加时在左侧补新滚轮（会话计数只增不减）
    while (counterEl.children.length < s.length) {
      var digit = document.createElement('div');
      digit.className = 'digit';
      var reel = document.createElement('div');
      reel.className = 'reel';
      for (var i = 0; i < 10; i++) {
        var sp = document.createElement('span');
        sp.textContent = i;
        reel.appendChild(sp);
      }
      digit.appendChild(reel);
      counterEl.insertBefore(digit, counterEl.firstChild);
    }
    // 滚轮位移到对应数字（-10% * d，相对滚轮自身高度）
    for (var k = 0; k < counterEl.children.length; k++) {
      var d = s.charCodeAt(k) - 48;
      counterEl.children[k].firstChild.style.transform = 'translateY(' + (-d * 10) + '%)';
    }
  }
  renderCounter(0);

  /* ================= 粒子系统（canvas + requestAnimationFrame） ================= */
  var particles = [];
  var GOLD = ['#ffd76a', '#ffb347', '#fff3c4', '#ffcc33', '#ffe08a'];

  function resizeCanvas() {
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    fxCanvas.width = Math.floor(window.innerWidth * dpr);
    fxCanvas.height = Math.floor(window.innerHeight * dpr);
    fxCanvas.style.width = window.innerWidth + 'px';
    fxCanvas.style.height = window.innerHeight + 'px';
    fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function trimParticles() {
    if (particles.length > 700) particles.splice(0, particles.length - 700);
  }

  /* 点状爆发（连击里程碑） */
  function burst(x, y, n, power) {
    for (var i = 0; i < n; i++) {
      var ang = Math.random() * Math.PI * 2;
      var spd = (0.25 + Math.random() * 0.75) * power;
      var max = 0.6 + Math.random() * 0.7;
      particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - power * 0.15,
        g: 320,
        r: 1.5 + Math.random() * 2.2,
        life: max, max: max,
        color: GOLD[(Math.random() * GOLD.length) | 0]
      });
    }
    trimParticles();
  }

  /* 全屏金色粒子（99 连击：梵音净化） */
  function rainBurst() {
    for (var i = 0; i < 140; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 40,
        vy: -20 - Math.random() * 90,
        g: -8,
        r: 1.2 + Math.random() * 2.4,
        life: 1 + Math.random() * 1.4,
        max: 2.4,
        color: GOLD[(Math.random() * GOLD.length) | 0]
      });
    }
    trimParticles();
  }

  var lastFrame = performance.now();
  function frame(t) {
    var dt = Math.min((t - lastFrame) / 1000, 0.05);
    lastFrame = t;
    fxCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    if (particles.length) {
      fxCtx.globalCompositeOperation = 'lighter';
      for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.life -= dt;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        p.vy += p.g * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        fxCtx.globalAlpha = Math.min(1, p.life / p.max);
        fxCtx.fillStyle = p.color;
        fxCtx.beginPath();
        fxCtx.arc(p.x, p.y, p.r, 0, 6.2832);
        fxCtx.fill();
      }
      fxCtx.globalAlpha = 1;
      fxCtx.globalCompositeOperation = 'source-over';
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  /* ================= 点击点效果 ================= */
  function spawnFloat(x, y, text, tier) {
    var wrap = document.createElement('div');
    wrap.className = 'float-text tier' + tier;
    wrap.style.left = (x + (Math.random() * 36 - 18)) + 'px';
    wrap.style.top = (y - 26) + 'px';
    var span = document.createElement('span');
    span.textContent = text;
    wrap.appendChild(span);
    document.body.appendChild(wrap);
    wrap.addEventListener('animationend', function () { wrap.remove(); }, { once: true });
  }

  function spawnRipple(x, y) {
    var r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    document.body.appendChild(r);
    r.addEventListener('animationend', function () { r.remove(); }, { once: true });
  }

  function showBanner(text, big) {
    var b = document.createElement('div');
    b.className = 'banner' + (big ? ' big' : '');
    b.textContent = text;
    document.body.appendChild(b);
    b.addEventListener('animationend', function () { b.remove(); }, { once: true });
  }

  /* ================= 连击里程碑 ================= */
  function onMilestone(c, x, y) {
    if (c === 10) {
      showBanner('功德 x10 🔥');
      burst(x, y, 42, 340);
    } else if (c === 30) {
      showBanner('功德 x30 💫');
      edgeGlow.classList.add('on');           // 屏幕边缘金光
      burst(x, y, 60, 400);
      playGong(false);
    } else if (c === 50) {
      showBanner('功德 x50！般若波罗蜜！', true);
      haloEl.classList.add('on');             // 功德光轮出现
      burst(x, y, 80, 460);
      playGong(false);
    } else if (c === 99) {
      showBanner('功德 x99！梵音净化！🌈', true);
      haloEl.classList.add('on');
      haloEl.classList.add('intense');        // 光轮增强
      rainBurst();                            // 全屏金粒子
      playGong(true);                         // 更低沉的锣
    } else if (c > 99 && c % 50 === 0) {
      // 99 之后每 50 连击小庆祝一次
      showBanner('功德 x' + c + '！🌈');
      burst(x, y, 60, 420);
      playGong(true);
    }
  }

  function clearComboFx() {
    edgeGlow.classList.remove('on');
    haloEl.classList.remove('on');
    haloEl.classList.remove('intense');
  }

  function resetCombo() {
    combo = 0;
    comboBox.classList.remove('on');
    clearComboFx();
  }

  /* ================= 静息状态：飘羽 + 心静如水 ================= */
  function showIdle() {
    // 羽毛从顶端随机位置缓缓飘落
    var f = document.createElement('div');
    f.className = 'feather';
    f.textContent = '🪶';
    f.style.left = (8 + Math.random() * 84) + 'vw';
    f.style.setProperty('--dur', (6 + Math.random() * 3) + 's');
    document.body.appendChild(f);
    f.addEventListener('animationend', function () { f.remove(); }, { once: true });
    // "心静如水" 淡入淡出
    zenEl.classList.remove('show');
    void zenEl.offsetWidth; // 强制重排以重启动画
    zenEl.classList.add('show');
  }
  zenEl.addEventListener('animationend', function () { zenEl.classList.remove('show'); });

  /* 连击衰减 + 静息检查（setInterval 轮询） */
  setInterval(function () {
    if (!lastClickTime) return; // 尚未开始敲击
    var idleFor = performance.now() - lastClickTime;
    if (idleFor > 3000) {
      if (combo > 0) resetCombo();            // 3 秒未敲击 → 连击清零
      if (!idleShown) { idleShown = true; showIdle(); }
    }
  }, 250);

  /* ================= 核心：敲击 ================= */
  function strike(x, y) {
    ensureAudio();  // 首次点击时创建 / 恢复 AudioContext
    playDong();

    var now = performance.now();
    // 0.5 秒内连续敲击 → 连击 +1；否则重新起链
    if (lastClickTime && now - lastClickTime <= 500) {
      combo++;
    } else {
      clearComboFx();
      combo = 1;
    }
    lastClickTime = now;
    idleShown = false;

    // ---- 计数与持久化 ----
    sessionCount++;
    checkDailyReset();
    stats.todayMerit++;
    stats.totalMerit++;
    if (combo > stats.todayBestCombo) stats.todayBestCombo = combo;
    if (combo > stats.maxCombo) stats.maxCombo = combo;
    saveStats();
    renderStats();
    renderCounter(sessionCount);

    // ---- 木鱼回弹动画（重启 keyframes） ----
    fishEl.classList.remove('striking');
    void fishEl.offsetWidth;
    fishEl.classList.add('striking');

    // ---- 飘浮功德文字（连击越高越夸张） ----
    var text, tier;
    if (combo >= 99)      { text = '功德 x' + combo + ' 🌈'; tier = 4; }
    else if (combo >= 50) { text = '功德 x' + combo + ' 🪷'; tier = 3; }
    else if (combo >= 30) { text = '功德 x' + combo + ' 💫'; tier = 2; }
    else if (combo >= 10) { text = '功德 x' + combo + ' 🔥'; tier = 1; }
    else                  { text = '功德 +1';               tier = 0; }
    spawnFloat(x, y, text, tier);
    spawnRipple(x, y);

    // ---- 连击指示 ----
    if (combo >= 2) {
      comboNum.textContent = combo;
      comboBox.classList.add('on');
      comboBox.classList.remove('pop');
      void comboBox.offsetWidth;
      comboBox.classList.add('pop');
    } else {
      comboBox.classList.remove('on');
    }

    // ---- 里程碑特效 ----
    onMilestone(combo, x, y);

    // 高连击时随手撒点小火花
    if (tier >= 1 && combo % 5 === 0) burst(x, y, 10, 240);

    // 首次敲击后隐藏提示
    if (sessionCount === 1) hintEl.classList.add('hide');
  }

  /* ================= 输入事件（鼠标 / 触摸 / 键盘） ================= */
  fishEl.addEventListener('pointerdown', function (e) {
    lastPointerDown = performance.now();
    strike(e.clientX, e.clientY);
  });
  // 键盘可达性：Enter / Space 触发的 click（detail === 0 且无近期 pointerdown）
  fishEl.addEventListener('click', function (e) {
    if (e.detail === 0 && performance.now() - lastPointerDown > 400) {
      var r = fishEl.getBoundingClientRect();
      strike(r.left + r.width / 2, r.top + r.height / 3);
    }
  });
  fishEl.addEventListener('contextmenu', function (e) { e.preventDefault(); });

  /* ================= 香火青烟 ================= */
  function spawnSmoke() {
    if (document.hidden) return;
    if (document.querySelectorAll('.smoke').length >= 15) return;
    var s = document.createElement('div');
    s.className = 'smoke';
    s.style.left = (Math.random() * 100) + 'vw';
    s.style.setProperty('--sway', (Math.random() * 120 - 60) + 'px');
    s.style.animationDuration = (8 + Math.random() * 6) + 's';
    var size = 5 + Math.random() * 6;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    document.body.appendChild(s);
    s.addEventListener('animationend', function () { s.remove(); }, { once: true });
  }
  setInterval(spawnSmoke, 700);
  for (var i = 0; i < 6; i++) setTimeout(spawnSmoke, i * 350);
})();
</script>
