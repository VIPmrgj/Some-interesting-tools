<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>钢琴块儿·极简黑</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%F0%9F%8E%B9%3C/text%3E%3C/svg%3E">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  background:#000;
  color:#fff;
  font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}

#app {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  width:100%;
  max-width:820px;
  padding:10px;
  position:relative;
  transition: transform 0.15s ease-out;
}
#app.shake { animation: shake 0.4s ease-in-out; }
#app.flash { animation: redFlash 0.35s ease-out; }

@keyframes shake {
  0%,100% { transform:translateX(0); }
  10%,50%,90% { transform:translateX(-6px); }
  30%,70% { transform:translateX(6px); }
}
@keyframes redFlash {
  0% { filter:drop-shadow(0 0 60px rgba(255,30,30,0.9)); }
  100% { filter:drop-shadow(0 0 0px rgba(255,30,30,0)); }
}

/* ── Top bar ── */
.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  max-width:740px;
  padding:0 4px;
}
.home-link {
  color:#666;
  text-decoration:none;
  font-size:14px;
  transition:color 0.2s;
  letter-spacing:1px;
}
.home-link:hover { color:#aaa; }
.title {
  font-size:20px;
  font-weight:300;
  letter-spacing:4px;
  color:#ddd;
}
.mode-toggle {
  background:transparent;
  border:1px solid #444;
  color:#999;
  padding:5px 14px;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
  letter-spacing:1px;
  transition:all 0.25s;
  font-family:inherit;
}
.mode-toggle:hover { border-color:#888; color:#ccc; }
.mode-toggle.dual { border-color:#8b5cf6; color:#a78bfa; }

/* ── Score bar ── */
.scorebar {
  display:flex;
  align-items:center;
  gap:24px;
  font-size:15px;
  letter-spacing:2px;
}
.score-label { color:#555; font-size:13px; }
.score-value { font-size:32px; font-weight:200; letter-spacing:3px; color:#fff; }
.speed-level { color:#555; font-size:12px; letter-spacing:2px; }

/* ── Canvas area ── */
.canvas-area {
  display:flex;
  gap:20px;
  justify-content:center;
  align-items:flex-start;
  position:relative;
}
.canvas-wrapper {
  position:relative;
  border:1px solid #1a1a1a;
  border-radius:4px;
  overflow:hidden;
}
.canvas-wrapper.left-board { border-color:#1a1e2a; }
.canvas-wrapper.right-board { border-color:#2a1a1a; }
.board-label {
  position:absolute;
  top:-22px;
  left:50%;
  transform:translateX(-50%);
  font-size:11px;
  letter-spacing:2px;
  color:#444;
  white-space:nowrap;
}
canvas {
  display:block;
  background:#0a0a0a;
}

/* ── Keyboard hints ── */
.keyboard-hints {
  display:none;
  gap:40px;
  justify-content:center;
  margin-top:4px;
}
.keyboard-hints.visible { display:flex; }
.key-group {
  display:flex;
  gap:8px;
}
.key-btn {
  width:52px;
  height:52px;
  border:1px solid #333;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  color:#555;
  background:#0d0d0d;
  transition:all 0.08s;
  letter-spacing:0;
}
.key-btn.pressed {
  background:#fff;
  color:#000;
  border-color:#fff;
  transform:scale(0.92);
  box-shadow:0 0 18px rgba(255,255,255,0.25);
}
.key-group.left .key-btn { border-color:#1e2430; }
.key-group.right .key-btn { border-color:#301e1e; }

/* ── Overlays ── */
.overlay {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.88);
  z-index:10;
  border-radius:4px;
  transition:opacity 0.3s;
}
.overlay.hidden { opacity:0; pointer-events:none; }

.overlay-title {
  font-size:28px;
  font-weight:200;
  letter-spacing:6px;
  margin-bottom:6px;
}
.overlay-score {
  font-size:56px;
  font-weight:100;
  letter-spacing:4px;
  color:#fff;
  margin-bottom:4px;
}
.overlay-sub {
  font-size:14px;
  color:#666;
  letter-spacing:2px;
  margin-bottom:20px;
}
.overlay-sub.record { color:#ff6b6b; }

.btn {
  background:transparent;
  border:1px solid #555;
  color:#ccc;
  padding:10px 36px;
  border-radius:24px;
  cursor:pointer;
  font-size:15px;
  letter-spacing:3px;
  transition:all 0.25s;
  font-family:inherit;
}
.btn:hover { border-color:#aaa; color:#fff; }
.btn.primary { border-color:#888; color:#fff; }
.btn.primary:hover { border-color:#fff; background:rgba(255,255,255,0.06); }

.start-highscore {
  font-size:13px;
  color:#444;
  letter-spacing:2px;
  margin-bottom:16px;
}

/* ── Responsive ── */
@media (max-width:800px) {
  .canvas-area { gap:10px; }
  .keyboard-hints { gap:20px; }
  .key-btn { width:42px; height:42px; font-size:15px; }
}
@media (max-width:500px) {
  .title { font-size:16px; letter-spacing:2px; }
  .score-value { font-size:24px; }
}
</style>
</head>
<body>

<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <a href="index.html" class="home-link">&#x1F3E0; 首页</a>
    <span class="title">钢琴块儿·极简黑</span>
    <button class="mode-toggle" id="modeToggle" title="切换单手/双手模式">单手模式</button>
  </div>

  <!-- Score bar -->
  <div class="scorebar">
    <span class="score-label">分数</span>
    <span class="score-value" id="scoreDisplay">0</span>
    <span class="speed-level" id="speedDisplay">速度 Lv.1</span>
  </div>

  <!-- Game area -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-wrapper" id="wrapperLeft">
      <span class="board-label" style="display:none">左手</span>
      <canvas id="canvasLeft"></canvas>
    </div>
    <div class="canvas-wrapper" id="wrapperRight" style="display:none">
      <span class="board-label" style="display:none">右手</span>
      <canvas id="canvasRight"></canvas>
    </div>
  </div>

  <!-- Keyboard hints (dual mode) -->
  <div class="keyboard-hints" id="keyboardHints">
    <div class="key-group left">
      <div class="key-btn" data-key="a">A</div>
      <div class="key-btn" data-key="s">S</div>
      <div class="key-btn" data-key="d">D</div>
      <div class="key-btn" data-key="f">F</div>
    </div>
    <div class="key-group right">
      <div class="key-btn" data-key="j">J</div>
      <div class="key-btn" data-key="k">K</div>
      <div class="key-btn" data-key="l">L</div>
      <div class="key-btn" data-key=";">;</div>
    </div>
  </div>

  <!-- Start overlay -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-title">钢琴块儿</div>
    <div class="overlay-sub">别踩白块</div>
    <span class="start-highscore" id="startHighscore">最高分: 0</span>
    <button class="btn primary" id="btnStart">&#x25B6; 开始</button>
    <button class="btn" id="btnStartDual" style="margin-top:8px;font-size:12px;letter-spacing:1px;display:none;">&#x25B6; 开始（双手）</button>
  </div>

  <!-- Game over overlay -->
  <div class="overlay hidden" id="gameOverOverlay">
    <div class="overlay-title">游戏结束</div>
    <div class="overlay-score" id="finalScore">0</div>
    <div class="overlay-sub" id="recordMsg"></div>
    <button class="btn primary" id="btnRestart">&#x1F504; 再来一局</button>
  </div>
</div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const CFG = {
  COLUMNS: 4,
  COLUMN_WIDTH: 90,
  BOARD_WIDTH: 360,
  BOARD_HEIGHT: 500,
  TILE_HEIGHT: 130,
  INITIAL_SPEED: 150,
  SPEED_LEVEL_POINTS: 50,
  SPEED_MULTIPLIER: 1.10,
  SPAWN_THRESHOLD: 0.38,
  TILE_PAD: 3,
  TILE_RADIUS: 3,
};

// ============================================================
// COLORS
// ============================================================
const COL = {
  bg: '#0a0a0a',
  border: '#1f1f1f',
  tileSingle: { top: '#3a3a3a', bot: '#1c1c1c' },
  tileLeft:   { top: '#2e3340', bot: '#151a24' },
  tileRight:  { top: '#402e2e', bot: '#241515' },
  tileBorder: 'rgba(255,255,255,0.04)',
};

// ============================================================
// DOM REFERENCES
// ============================================================
const $ = (sel) => document.querySelector(sel);
const app        = $('#app');
const canvasL    = $('#canvasLeft');
const canvasR    = $('#canvasRight');
const wrapperL   = $('#wrapperLeft');
const wrapperR   = $('#wrapperRight');
const canvasArea = $('#canvasArea');
const scoreDisp  = $('#scoreDisplay');
const speedDisp  = $('#speedDisplay');
const modeToggle = $('#modeToggle');
const startOver  = $('#startOverlay');
const gameOver   = $('#gameOverOverlay');
const finalScore = $('#finalScore');
const recordMsg  = $('#recordMsg');
const startHigh  = $('#startHighscore');
const keyHints   = $('#keyboardHints');
const btnStart   = $('#btnStart');
const btnStartD  = $('#btnStartDual');
const btnRestart = $('#btnRestart');
const keyBtns    = document.querySelectorAll('.key-btn');

// ============================================================
// GAME STATE
// ============================================================
let mode       = 'single';  // 'single' | 'dual'
let gameState  = 'idle';    // 'idle' | 'playing' | 'over'
let score      = 0;
let boards     = [];         // Board instances
let highSingle = 0;
let highDual   = 0;
let animId     = null;
let lastTime   = 0;

// ============================================================
// STORAGE
// ============================================================
function loadHighScores() {
  try {
    highSingle = parseInt(localStorage.getItem('pt_high_single')) || 0;
    highDual   = parseInt(localStorage.getItem('pt_high_dual')) || 0;
  } catch(e) { highSingle = 0; highDual = 0; }
}
function saveHighScore(val) {
  try {
    if (mode === 'single' && val > highSingle) {
      highSingle = val;
      localStorage.setItem('pt_high_single', val);
    } else if (mode === 'dual' && val > highDual) {
      highDual = val;
      localStorage.setItem('pt_high_dual', val);
    }
  } catch(e) { /* ignore */ }
}

// ============================================================
// BOARD CLASS — one game board (canvas + logic)
// ============================================================
class Board {
  constructor(canvas, tileColors, boardIndex) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.tileTopColor = tileColors.top;
    this.tileBotColor = tileColors.bot;
    this.boardIndex = boardIndex;

    canvas.width  = CFG.BOARD_WIDTH;
    canvas.height = CFG.BOARD_HEIGHT;

    this.w = CFG.BOARD_WIDTH;
    this.h = CFG.BOARD_HEIGHT;
    this.cw = CFG.COLUMN_WIDTH;
    this.th = CFG.TILE_HEIGHT;

    // columns: each is an array of tile objects { y: number }
    this.columns = [];
    for (let i = 0; i < CFG.COLUMNS; i++) {
      this.columns.push([]);
    }
  }

  reset() {
    for (let col of this.columns) col.length = 0;
  }

  /** Initialize staggered tiles at game start */
  initTiles() {
    this.reset();
    const offsets = [0.0, 0.12, 0.24, 0.08];
    for (let i = 0; i < CFG.COLUMNS; i++) {
      this.columns[i].push({ y: this.h * offsets[i] });
    }
  }

  /** Move tiles and check spawns. Returns 'fall' if game over, null otherwise. */
  update(distance) {
    for (let ci = 0; ci < CFG.COLUMNS; ci++) {
      const col = this.columns[ci];

      // Move all tiles down
      for (let tile of col) {
        tile.y += distance;
      }

      // Check for tile fallen off bottom
      for (let tile of col) {
        if (tile.y + this.th >= this.h + 2) {
          return 'fall';
        }
      }

      // Spawn logic
      if (col.length === 0) {
        // Immediately spawn at top
        col.push({ y: -this.th * 0.15 });
      } else if (col.length < 2) {
        // Check if the lowest tile has passed spawn threshold
        const lowest = col[col.length - 1];
        if (lowest.y >= this.h * CFG.SPAWN_THRESHOLD) {
          col.unshift({ y: -this.th * 0.15 });
        }
      }
    }
    return null;
  }

  /** Tap a column. Returns 'hit' (score +1) or 'miss' (game over). */
  tapColumn(ci) {
    if (ci < 0 || ci >= CFG.COLUMNS) return 'miss';
    const col = this.columns[ci];
    if (col.length === 0) return 'miss';
    // Remove lowest tile
    col.pop();
    return 'hit';
  }

  /** Render the board */
  render() {
    const ctx = this.ctx;

    // Background
    ctx.fillStyle = COL.bg;
    ctx.fillRect(0, 0, this.w, this.h);

    // Column separators
    ctx.strokeStyle = COL.border;
    ctx.lineWidth = 1;
    for (let i = 1; i < CFG.COLUMNS; i++) {
      const x = i * this.cw;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, this.h);
      ctx.stroke();
    }

    // Draw tiles
    for (let ci = 0; ci < CFG.COLUMNS; ci++) {
      const col = this.columns[ci];
      const x = ci * this.cw;
      for (const tile of col) {
        const ty = tile.y;
        // Only draw if at least partially visible
        if (ty + this.th <= 0 || ty >= this.h) continue;

        const tx = x + CFG.TILE_PAD;
        const tw = this.cw - CFG.TILE_PAD * 2;
        const thDraw = this.th - CFG.TILE_PAD * 2;
        const tyDraw = ty + CFG.TILE_PAD;

        // Gradient fill
        const grad = ctx.createLinearGradient(0, tyDraw, 0, tyDraw + thDraw);
        grad.addColorStop(0, this.tileTopColor);
        grad.addColorStop(1, this.tileBotColor);
        ctx.fillStyle = grad;

        // Rounded rect for tile
        const r = CFG.TILE_RADIUS;
        ctx.beginPath();
        ctx.moveTo(tx + r, tyDraw);
        ctx.lineTo(tx + tw - r, tyDraw);
        ctx.quadraticCurveTo(tx + tw, tyDraw, tx + tw, tyDraw + r);
        ctx.lineTo(tx + tw, tyDraw + thDraw - r);
        ctx.quadraticCurveTo(tx + tw, tyDraw + thDraw, tx + tw - r, tyDraw + thDraw);
        ctx.lineTo(tx + r, tyDraw + thDraw);
        ctx.quadraticCurveTo(tx, tyDraw + thDraw, tx, tyDraw + thDraw - r);
        ctx.lineTo(tx, tyDraw + r);
        ctx.quadraticCurveTo(tx, tyDraw, tx + r, tyDraw);
        ctx.closePath();
        ctx.fill();

        // Subtle border / 3D bevel
        ctx.strokeStyle = COL.tileBorder;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  /** Convert screen coordinates to column index. Returns -1 if out of bounds. */
  columnFromX(screenX) {
    const rect = this.canvas.getBoundingClientRect();
    const scaleX = this.w / rect.width;
    const cx = (screenX - rect.left) * scaleX;
    if (cx < 0 || cx >= this.w) return -1;
    return Math.floor(cx / this.cw);
  }
}

// ============================================================
// CREATE BOARDS
// ============================================================
function createBoards() {
  boards = [];
  if (mode === 'single') {
    const b = new Board(canvasL, COL.tileSingle, 0);
    boards.push(b);
  } else {
    const bL = new Board(canvasL, COL.tileLeft, 0);
    const bR = new Board(canvasR, COL.tileRight, 1);
    boards.push(bL, bR);
  }
}

// ============================================================
// UI HELPERS
// ============================================================
function updateScoreUI() {
  scoreDisp.textContent = score;
  const level = Math.floor(score / CFG.SPEED_LEVEL_POINTS) + 1;
  speedDisp.textContent = '速度 Lv.' + level;
}

function showOverlay(el) {
  el.classList.remove('hidden');
}
function hideOverlay(el) {
  el.classList.add('hidden');
}

function updateStartScreen() {
  const hs = mode === 'single' ? highSingle : highDual;
  startHigh.textContent = '最高分: ' + hs;
  if (mode === 'single') {
    btnStart.style.display = '';
    btnStartD.style.display = 'none';
  } else {
    btnStart.style.display = 'none';
    btnStartD.style.display = '';
  }
}

function setDualUI(dual) {
  if (dual) {
    wrapperR.style.display = '';
    wrapperL.querySelector('.board-label').style.display = '';
    wrapperR.querySelector('.board-label').style.display = '';
    wrapperL.classList.add('left-board');
    wrapperR.classList.add('right-board');
    keyHints.classList.add('visible');
    modeToggle.textContent = '双手互搏模式';
    modeToggle.classList.add('dual');
  } else {
    wrapperR.style.display = 'none';
    wrapperL.querySelector('.board-label').style.display = 'none';
    wrapperR.querySelector('.board-label').style.display = 'none';
    wrapperL.classList.remove('left-board');
    wrapperR.classList.remove('right-board');
    keyHints.classList.remove('visible');
    modeToggle.textContent = '单手模式';
    modeToggle.classList.remove('dual');
  }
}

function flashAndShake() {
  app.classList.add('flash', 'shake');
  setTimeout(() => {
    app.classList.remove('flash', 'shake');
  }, 450);
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;

  // Clamp dt to avoid huge jumps (e.g., tab was backgrounded)
  if (dt > 0.2) dt = 0.016;

  if (gameState === 'playing') {
    const level = Math.floor(score / CFG.SPEED_LEVEL_POINTS);
    const speed = CFG.INITIAL_SPEED * Math.pow(CFG.SPEED_MULTIPLIER, level);
    const distance = speed * dt;

    let gameOverReason = null;

    for (const board of boards) {
      const reason = board.update(distance);
      if (reason === 'fall') {
        gameOverReason = 'fall';
        break;
      }
    }

    if (gameOverReason) {
      endGame(gameOverReason);
    }

    updateSpeedDisplay();
    renderAll();
  }

  animId = requestAnimationFrame(gameLoop);
}

function updateSpeedDisplay() {
  const level = Math.floor(score / CFG.SPEED_LEVEL_POINTS) + 1;
  speedDisp.textContent = '速度 Lv.' + level;
}

function renderAll() {
  for (const board of boards) {
    board.render();
  }
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  score = 0;
  lastTime = 0;
  gameState = 'playing';

  createBoards();
  for (const board of boards) {
    board.initTiles();
  }

  updateScoreUI();
  updateSpeedDisplay();
  hideOverlay(startOver);
  hideOverlay(gameOver);
  renderAll();

  if (!animId) {
    animId = requestAnimationFrame(gameLoop);
  }
}

function endGame(reason) {
  gameState = 'over';
  flashAndShake();

  const prevHigh = mode === 'single' ? highSingle : highDual;
  const isNewRecord = score > prevHigh;
  saveHighScore(score);

  finalScore.textContent = score;
  if (isNewRecord) {
    recordMsg.textContent = '新纪录！';
    recordMsg.classList.add('record');
  } else {
    const best = mode === 'single' ? highSingle : highDual;
    recordMsg.textContent = '最高分: ' + best;
    recordMsg.classList.remove('record');
  }

  showOverlay(gameOver);
  updateStartScreen();
  renderAll();
}

function resetToIdle() {
  gameState = 'idle';
  score = 0;
  lastTime = 0;
  updateScoreUI();
  updateSpeedDisplay();

  createBoards();
  for (const board of boards) {
    board.initTiles();
  }

  hideOverlay(gameOver);
  showOverlay(startOver);
  updateStartScreen();
  renderAll();
}

// ============================================================
// INPUT: TAP PROCESSING
// ============================================================
function processTap(boardIndex, columnIndex) {
  if (gameState !== 'playing') return;
  const board = boards[boardIndex];
  if (!board) return;

  const result = board.tapColumn(columnIndex);
  if (result === 'hit') {
    score++;
    updateScoreUI();
  } else if (result === 'miss') {
    endGame('miss');
  }
}

// ============================================================
// MOUSE / TOUCH INPUT (single mode)
// ============================================================
function handleCanvasPointer(e) {
  if (gameState !== 'playing') return;
  if (mode !== 'single') return;

  e.preventDefault();

  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const board = boards[0];
  if (!board) return;

  const ci = board.columnFromX(clientX);
  if (ci < 0) {
    endGame('miss');
    return;
  }
  processTap(0, ci);
}

canvasL.addEventListener('mousedown', handleCanvasPointer);
canvasL.addEventListener('touchstart', handleCanvasPointer, { passive: false });

// Prevent context menu on canvas
canvasL.addEventListener('contextmenu', e => e.preventDefault());

// ============================================================
// KEYBOARD INPUT (dual mode + single mode)
// ============================================================
const KEY_MAP = {
  // Single mode or left board
  'a': { board: 0, col: 0 },
  's': { board: 0, col: 1 },
  'd': { board: 0, col: 2 },
  'f': { board: 0, col: 3 },
  // Right board (dual mode only)
  'j': { board: 1, col: 0 },
  'k': { board: 1, col: 1 },
  'l': { board: 1, col: 2 },
  ';': { board: 1, col: 3 },
};

const pressedKeys = new Set();

function handleKeyDown(e) {
  if (gameState !== 'playing') return;

  const key = e.key.toLowerCase();
  const mapping = KEY_MAP[key];
  if (!mapping) return;

  // If single mode, ignore right-hand keys
  if (mode === 'single' && mapping.board > 0) return;

  e.preventDefault();

  // Highlight key button
  highlightKey(key);

  processTap(mapping.board, mapping.col);
}

function handleKeyUp(e) {
  const key = e.key.toLowerCase();
  unhighlightKey(key);
}

function highlightKey(key) {
  const btn = document.querySelector('.key-btn[data-key="' + CSS.escape(key) + '"]');
  if (btn) btn.classList.add('pressed');
  pressedKeys.add(key);
}

function unhighlightKey(key) {
  const btn = document.querySelector('.key-btn[data-key="' + CSS.escape(key) + '"]');
  if (btn) btn.classList.remove('pressed');
  pressedKeys.delete(key);
}

// Clear all highlights (in case of stuck keys)
function clearAllKeyHighlights() {
  keyBtns.forEach(b => b.classList.remove('pressed'));
  pressedKeys.clear();
}

document.addEventListener('keydown', handleKeyDown);
document.addEventListener('keyup', handleKeyUp);
// Clear highlights when window loses focus
window.addEventListener('blur', clearAllKeyHighlights);

// ============================================================
// MODE SWITCHING
// ============================================================
function switchMode(newMode) {
  if (gameState === 'playing') return; // Don't switch mid-game
  mode = newMode;
  setDualUI(mode === 'dual');
  createBoards();
  for (const board of boards) {
    board.initTiles();
  }
  updateStartScreen();
  updateScoreUI();
  updateSpeedDisplay();
  hideOverlay(gameOver);
  showOverlay(startOver);
  renderAll();
}

modeToggle.addEventListener('click', () => {
  if (gameState === 'playing') return;
  const newMode = mode === 'single' ? 'dual' : 'single';
  switchMode(newMode);
});

// ============================================================
// BUTTON HANDLERS
// ============================================================
btnStart.addEventListener('click', () => {
  if (mode !== 'single') switchMode('single');
  startGame();
});

btnStartD.addEventListener('click', () => {
  if (mode !== 'dual') switchMode('dual');
  startGame();
});

btnRestart.addEventListener('click', () => {
  startGame();
});

// ============================================================
// INITIALIZATION
// ============================================================
function init() {
  loadHighScores();
  mode = 'single';
  setDualUI(false);
  createBoards();
  for (const board of boards) {
    board.initTiles();
  }
  updateStartScreen();
  updateScoreUI();
  updateSpeedDisplay();
  showOverlay(startOver);
  hideOverlay(gameOver);
  renderAll();
  // Start the animation loop (renders idle state)
  animId = requestAnimationFrame(gameLoop);
}

init();

// ============================================================
// HANDLE WINDOW RESIZE (re-render idle state)
// ============================================================
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    if (gameState !== 'playing') {
      createBoards();
      for (const board of boards) {
        board.initTiles();
      }
      renderAll();
    }
  }, 200);
});
